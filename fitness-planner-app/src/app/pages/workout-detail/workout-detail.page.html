<ion-header>                                                                                                                                                                                                         <ion-toolbar>
      <ion-buttons slot="start">                                                                                                                                                                                           <ion-button (click)="cancel()">Otkaži</ion-button>
      </ion-buttons>
      <ion-title>{{ isNew ? 'Novi plan' : 'Izmeni plan' }}</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="save()">Sačuvaj</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <ion-item>
      <ion-label position="floating">Naziv plana</ion-label>
      <ion-input [(ngModel)]="workout.name"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Opis</ion-label>
      <ion-textarea [(ngModel)]="workout.description"></ion-textarea>
    </ion-item>

    <ion-item>
      <ion-label>Tip treninga</ion-label>
      <ion-select [(ngModel)]="workout.type">
        <ion-select-option value="snaga">Snaga</ion-select-option>
        <ion-select-option value="kardio">Kardio</ion-select-option>
        <ion-select-option value="fleksibilnost">Fleksibilnost</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-content>
