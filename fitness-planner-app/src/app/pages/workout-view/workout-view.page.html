<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Pregled treninga</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="notFound" class="empty-state">
    <ion-icon name="alert-circle-outline" size="large"></ion-icon>
    <p>Plan treninga je obrisan i više nije dostupan.</p>
  </div>

  <div *ngIf="workout">

    <ion-card>
      <ion-card-header>
        <ion-card-title>{{ workout.name }}</ion-card-title>
        <ion-card-subtitle>{{ workout.type }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <p *ngIf="workout.description">{{ workout.description }}</p>
        <p><strong>Trajanje sesije:</strong> {{ duration }} min</p>
      </ion-card-content>
    </ion-card>

    <ion-card *ngIf="workout.exercises && workout.exercises.length > 0">
      <ion-card-header>
        <ion-card-title>Vežbe</ion-card-title>
      </ion-card-header>
      <ion-card-content class="ion-no-padding">
        <ion-list lines="full">
          <ion-item *ngFor="let exercise of workout.exercises">
            <ion-label>
              <h2>{{ exercise.name }}</h2>
              <p>
                <span *ngIf="exercise.sets">{{ exercise.sets }} seta</span>
                <span *ngIf="exercise.reps"> &bull; {{ exercise.reps }} ponavljanja</span>
                <span *ngIf="exercise.weight"> &bull; {{ exercise.weight }} kg</span>
              </p>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
