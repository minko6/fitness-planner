<ion-app>

  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Meni</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>

      <div class="user-info">
        <div class="avatar">{{ userInitials }}</div>
        <p>{{ userEmail }}</p>
      </div>

      <ion-list lines="none">
        <ion-item button (click)="goToProgress()">
          <ion-icon name="trending-up-outline" slot="start"></ion-icon>
          <ion-label>Progres</ion-label>
        </ion-item>
        <ion-item button (click)="logout()">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Odjava</ion-label>
        </ion-item>
      </ion-list>

    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
