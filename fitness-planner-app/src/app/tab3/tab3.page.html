<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Istorija</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="sessions.length === 0" class="empty-state">
    <ion-icon name="barbell-outline"></ion-icon>
    <p>Još nema odrađenih treninga.</p>
  </div>

  <ion-list *ngIf="sessions.length > 0">
    <ion-item *ngFor="let session of sessions">
      <ion-label>
        <h2>{{ session.workoutName }}</h2>
        <p>{{ formatDate(session.date) }} &bull; {{ session.duration }} min</p>
      </ion-label>
      <ion-badge slot="end" color="primary">{{ session.workoutType }}</ion-badge>
      <ion-button slot="end" fill="clear" color="danger" (click)="deleteSession(session.id)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
